name: "Profile dependabot alerts across all HOF services"
description: "Fetches dependabot alerts for all HOF services and sends a summary to Slack."
inputs:
  slack-webhook-url:
    description: "Slack Webhook URL for notifications"
    required: true
runs:
  using: "composite"
  steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24

    - name: Run dependabot profiler
      env:
        GITHUB_TOKEN: ${{ secrets.DEPENDABOT_PAT }}
      run: |
        set -euo pipefail
        node hof-dependabot-profiler/index.js --output=slack-json > slack-payload.json

    - name: Notify Slack
      env:
        SLACK_WEBHOOK_URL: ${{ inputs.slack-webhook-url }}
      run: |
        set -euo pipefail
        curl -X POST -H 'Content-type: application/json' --data "@slack-payload.json" "$SLACK_WEBHOOK_URL"
